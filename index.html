<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — Your Private Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,300;1,400;1,600&family=Abhaya+Libre:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --royal: #1a3a6b;
    --royal-dark: #0f2347;
    --royal-mid: #2a5298;
    --royal-light: #c8d8f0;
    --cream: #faf6f0;
    --cream-dark: #f0e8d8;
    --cream-border: #e2d5c0;
    --ink: #1a1410;
    --ink-soft: #3d3228;
    --ink-muted: #7a6e60;
    --gold: #c8a84b;
    --serif: 'Cormorant', Georgia, serif;
    --login-serif: 'Cormorant', Georgia, serif;
    --sans: 'Abhaya Libre', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    overflow-x: hidden;
  }

  /* LOGIN PAGE */
  #login-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--cream);
    overflow: hidden;
  }

  .bg-pattern {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(26,58,107,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(200,168,75,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .bg-lines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(26,58,107,0.04) 39px,
      rgba(26,58,107,0.04) 40px
    );
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 3rem 2.5rem 2.5rem;
    max-width: 460px;
    width: 90%;
    animation: fadeUp 0.9s ease forwards;
    opacity: 0;
    transform: translateY(24px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .brand-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2.5rem;
  }

  .brand-icon { width: 38px; height: 38px; }

  .brand-name {
    font-family: var(--login-serif);
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--royal-dark);
    letter-spacing: 0.08em;
    text-transform: lowercase;
  }

  .login-headline {
    font-family: var(--login-serif);
    font-size: clamp(2.2rem, 5.5vw, 3.2rem);
    font-weight: 600;
    font-style: italic;
    color: var(--royal-dark);
    line-height: 1.2;
    margin-bottom: 0.6rem;
    letter-spacing: -0.01em;
  }

  .login-sub {
    font-size: 0.85rem;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--cream-border);
  }
  .divider-gem {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .login-form { display: flex; flex-direction: column; gap: 1rem; }

  .field-group { position: relative; }

  .field-group label {
    position: absolute;
    top: 50%; left: 14px;
    transform: translateY(-50%);
    font-size: 0.8rem;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    pointer-events: none;
    transition: all 0.2s ease;
  }

  .field-group input {
    width: 100%;
    background: #fff;
    border: 1px solid var(--cream-border);
    border-radius: 4px;
    padding: 1rem 1rem 0.5rem;
    font-family: var(--sans);
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .field-group input:focus { border-color: var(--royal-mid); }
  .field-group input:focus + label,
  .field-group input:not(:placeholder-shown) + label { top: 9px; font-size: 0.65rem; }

  .login-btn {
    margin-top: 0.5rem;
    padding: 0.9rem;
    background: var(--royal);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, transform 0.15s;
  }
  .login-btn:hover { background: var(--royal-dark); transform: translateY(-1px); }

  .login-footer { margin-top: 1.5rem; font-size: 0.75rem; color: var(--ink-muted); }
  .login-footer a { color: var(--royal-mid); text-decoration: none; cursor: pointer; }

  /* JOURNAL APP */
  #app-page { display: none; min-height: 100vh; background: var(--cream); }

  .top-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,246,240,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cream-border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 58px; gap: 1rem;
  }

  .nav-brand {
    font-family: var(--serif);
    font-size: 1.55rem; font-weight: 700;
    color: var(--royal-dark);
    letter-spacing: 0.06em; text-transform: lowercase;
    display: flex; align-items: center; gap: 8px;
  }

  .nav-right { display: flex; align-items: center; gap: 1rem; }

  .new-entry-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0.45rem 1rem;
    background: var(--royal); color: var(--cream);
    border: none; border-radius: 4px;
    font-family: var(--sans); font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .new-entry-btn:hover { background: var(--royal-dark); }

  .avatar-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--royal-light);
    border: 1.5px solid var(--royal-mid);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 1rem; font-weight: 600;
    color: var(--royal-dark);
    cursor: pointer; position: relative;
  }

  .avatar-dropdown {
    position: absolute;
    top: calc(100% + 8px); right: 0;
    background: #fff;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    padding: 0.5rem 0;
    min-width: 160px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: none;
  }
  .avatar-btn.open .avatar-dropdown { display: block; }
  .avatar-dropdown a {
    display: block; padding: 0.6rem 1rem;
    font-size: 0.82rem; color: var(--ink-soft);
    text-decoration: none; cursor: pointer;
    transition: background 0.15s;
  }
  .avatar-dropdown a:hover { background: var(--cream); }
  .avatar-dropdown .sign-out { color: #c0392b; }

  .app-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 58px);
  }

  .sidebar {
    border-right: 1px solid var(--cream-border);
    padding: 1.5rem 0;
    background: rgba(255,255,255,0.5);
    overflow-y: auto;
    position: sticky; top: 58px;
    height: calc(100vh - 58px);
  }

  .sidebar-section { padding: 0 1.2rem; margin-bottom: 1.5rem; }

  .sidebar-label {
    font-size: 0.65rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 0.6rem; padding-left: 4px;
  }

  .entry-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

  .entry-item {
    padding: 0.55rem 0.75rem; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .entry-item:hover { background: var(--cream-dark); }
  .entry-item.active { background: var(--royal-light); border-left-color: var(--royal); }

  .entry-item-date { font-size: 0.7rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .entry-item-title {
    font-family: var(--serif); font-size: 0.95rem; color: var(--ink-soft);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
  }

  .editor-area {
    display: flex; flex-direction: column;
    max-width: 720px; margin: 0 auto;
    padding: 2.5rem 2rem 4rem; width: 100%;
  }

  .welcome-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; text-align: center;
  }

  .welcome-cta {
    padding: 0.7rem 2rem;
    background: transparent; border: 1px solid var(--royal); color: var(--royal);
    border-radius: 4px; font-family: var(--sans);
    font-size: 0.82rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .welcome-cta:hover { background: var(--royal); color: var(--cream); }

  .editor-form { display: none; }
  .notebook-view { display: none; }

  .editor-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
  }

  .back-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--cream-border); background: #fff; color: var(--ink-soft);
    border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-size: 1rem; line-height: 1; cursor: pointer; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--royal-mid); color: var(--royal); }

  .editor-date-display {
    font-size: 0.78rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-muted);
  }

  .tag-input-wrapper {
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
    background: #fff; border: 1px solid var(--cream-border); border-radius: 4px;
    padding: 0.4rem 0.75rem; margin-bottom: 0.75rem; min-height: 38px; cursor: text;
  }

  .tag-pill {
    background: var(--royal-light); color: var(--royal-dark);
    font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
    display: flex; align-items: center; gap: 4px; letter-spacing: 0.03em;
  }

  .tag-remove {
    background: none; border: none; cursor: pointer;
    color: var(--royal-mid); font-size: 0.9rem; line-height: 1; padding: 0;
  }

  .tag-field {
    border: none; outline: none; font-family: var(--sans);
    font-size: 0.8rem; color: var(--ink-muted); background: transparent;
    flex: 1; min-width: 80px;
  }

  .title-field {
    width: 100%; border: none; background: transparent;
    font-family: var(--serif); font-size: clamp(1.7rem, 3.5vw, 2.3rem);
    font-weight: 700; color: var(--royal-dark);
    line-height: 1.2; padding: 0; outline: none;
    margin-bottom: 1.2rem; resize: none;
  }

  /* TOOLBAR — simplified & cleaner */
  .toolbar {
    display: flex; 
    flex-wrap: wrap; 
    gap: 3px;
    padding: 0.45rem 0.5rem;
    background: #fff;
    border: 1px solid var(--cream-border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }

  .tool-btn {
    height: 30px; 
    min-width: 30px;
    display: flex; 
    align-items: center; 
    justify-content: center;
    border: none; 
    background: transparent; 
    border-radius: 3px;
    cursor: pointer; 
    font-size: 0.8rem; 
    font-weight: 600;
    color: var(--ink-muted);
    transition: background 0.15s, color 0.15s;
    padding: 0 6px;
  }
  .tool-btn:hover { background: var(--cream-dark); color: var(--royal); }
  .tool-btn.active {
    background: var(--royal); 
    color: #fff;
    box-shadow: 0 0 0 2px rgba(26,58,107,0.2);
  }

  .tool-sep {
    width: 1px; 
    background: var(--cream-border);
    margin: 4px 2px; 
    align-self: stretch;
  }

  .body-field {
    width: 100%; 
    min-height: 380px;
    border: 1px solid var(--cream-border);
    border-top: none; 
    border-radius: 0 0 4px 4px;
    background: #fff; 
    padding: 1.35rem 1.4rem;
    font-family: var(--serif); 
    font-size: 1.15rem;
    font-weight: 400;
    line-height: 1.9; 
    color: var(--ink-soft);
    resize: vertical; 
    outline: none; 
    white-space: pre-wrap;
    background-image: repeating-linear-gradient(
      to bottom, transparent 0,
      transparent calc(1.9em - 1px),
      rgba(26,58,107,0.1) calc(1.9em - 1px),
      rgba(26,58,107,0.1) 1.9em
    );
    background-size: 100% 1.9em;
    background-position-y: 1.35rem;
    background-attachment: local;
  }
  .body-field:focus { border-color: var(--royal-mid); }
  .body-field:empty:before { content: attr(data-placeholder); color: var(--ink-muted); opacity: 0.7; }

  .save-btn {
    margin-top: 1.2rem; 
    padding: 0.75rem 2.5rem;
    background: var(--royal); 
    color: var(--cream);
    border: none; 
    border-radius: 4px;
    font-family: var(--sans); 
    font-size: 0.82rem; 
    font-weight: 500;
    letter-spacing: 0.08em; 
    text-transform: uppercase;
    cursor: pointer; 
    transition: background 0.2s; 
    align-self: flex-start;
  }
  .save-btn:hover { background: var(--royal-dark); }

  .entry-view { display: none; }

  .notebook-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem; 
    margin-top: 1.5rem;
  }

  .notebook-card {
    background: #fff; 
    border: 1px solid var(--cream-border);
    border-radius: 8px; 
    padding: 1rem;
    cursor: pointer; 
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
  }
  .notebook-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border-color: var(--royal-mid);
  }

  .notebook-spine {
    position: absolute; 
    left: 0; 
    top: 0; 
    bottom: 0; 
    width: 6px;
    background: linear-gradient(180deg, var(--royal), var(--gold));
    border-top-left-radius: 8px; 
    border-bottom-left-radius: 8px;
  }

  .notebook-title { 
    font-family: var(--serif); 
    font-size: 1.15rem; 
    font-weight: 700; 
    color: var(--royal-dark); 
    margin-bottom: 0.4rem; 
    padding-left: 0.5rem; 
  }
  .notebook-meta { 
    font-size: 0.72rem; 
    color: var(--ink-muted); 
    letter-spacing: 0.05em; 
    text-transform: uppercase; 
    padding-left: 0.5rem; 
  }
  .notebook-excerpt { 
    margin-top: 0.6rem; 
    font-size: 0.85rem; 
    color: var(--ink-soft); 
    line-height: 1.5; 
    padding-left: 0.5rem; 
  }

  .entry-view-header { 
    margin-bottom: 2rem; 
    border-bottom: 1px solid var(--cream-border); 
    padding-bottom: 1.5rem; 
  }
  .entry-view-meta { 
    display: flex; 
    align-items: center; 
    gap: 1rem; 
    margin-bottom: 0.75rem; 
    flex-wrap: wrap; 
  }
  .entry-view-date { 
    font-size: 0.75rem; 
    letter-spacing: 0.1em; 
    text-transform: uppercase; 
    color: var(--ink-muted); 
  }
  .entry-view-title { 
    font-family: var(--serif); 
    font-size: clamp(1.7rem, 3.5vw, 2.3rem); 
    font-weight: 700; 
    color: var(--royal-dark); 
    line-height: 1.2; 
    margin-bottom: 0.75rem; 
  }
  .entry-view-body { 
    font-family: var(--serif); 
    font-size: 1.15rem; 
    font-weight: 400; 
    line-height: 1.9; 
    color: var(--ink-soft); 
    white-space: pre-wrap; 
  }
  .entry-view-tags { 
    display: flex; 
    gap: 6px; 
    flex-wrap: wrap; 
    margin-top: 1.5rem; 
  }

  .search-bar { 
    position: relative; 
    padding: 0 1.2rem; 
    margin-bottom: 1rem; 
  }
  .search-bar input {
    width: 100%; 
    background: #fff; 
    border: 1px solid var(--cream-border);
    border-radius: 4px; 
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    font-family: var(--sans); 
    font-size: 0.8rem; 
    color: var(--ink); 
    outline: none;
  }
  .search-bar input:focus { border-color: var(--royal-mid); }
  .search-icon { 
    position: absolute; 
    left: 1.9rem; 
    top: 50%; 
    transform: translateY(-50%); 
    color: var(--ink-muted); 
    font-size: 0.9rem; 
  }

  .toast {
    position: fixed; 
    bottom: 2rem; 
    right: 2rem;
    background: var(--royal-dark); 
    color: var(--cream);
    padding: 0.7rem 1.4rem; 
    border-radius: 4px;
    font-size: 0.82rem; 
    letter-spacing: 0.04em;
    z-index: 999; 
    opacity: 0; 
    transform: translateY(8px);
    transition: all 0.3s; 
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .gold-line { width: 32px; height: 2px; background: var(--gold); margin: 1.2rem auto; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--cream-border); border-radius: 2px; }

  .mobile-search { display: none; margin-bottom: 1.25rem; }
  .mobile-search input {
    width: 100%; 
    background: #fff; 
    border: 1px solid var(--cream-border);
    border-radius: 6px; 
    padding: 0.65rem 0.85rem;
    font-family: var(--sans); 
    font-size: 1rem; 
    color: var(--ink); 
    outline: none; 
    min-height: 44px;
  }
  .mobile-search input:focus { border-color: var(--royal-mid); }

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    .app-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mobile-search { display: block; }

    .top-nav { height: 64px; padding: 0 1.1rem; }
    .nav-brand { font-size: 1.3rem; }
    .new-entry-btn { min-height: 44px; padding: 0 1.1rem; font-size: 0.85rem; border-radius: 6px; }
    .avatar-btn { width: 44px; height: 44px; font-size: 1.1rem; }
    .avatar-dropdown { min-width: 180px; }
    .avatar-dropdown a { padding: 0.8rem 1.1rem; font-size: 0.9rem; }

    .editor-area { max-width: none; padding: 1.5rem 1.1rem 5rem; }

    .title-field { font-size: clamp(1.9rem, 6.5vw, 2.6rem); margin-bottom: 1.2rem; }

    .toolbar { 
      gap: 5px; 
      padding: 0.65rem 0.6rem; 
      border-radius: 8px 8px 0 0; 
    }
    .tool-btn { 
      height: 44px; 
      min-width: 44px; 
      border-radius: 7px; 
      font-size: 0.95rem; 
      background: var(--cream); 
      border: 1px solid var(--cream-border); 
    }
    .tool-sep { display: none; }

    .body-field { 
      min-height: 52vh; 
      padding: 1.3rem 1.1rem; 
      font-size: 1.12rem; 
      line-height: 1.85; 
      border-radius: 0 0 8px 8px; 
    }

    .tag-input-wrapper { min-height: 48px; padding: 0.6rem 0.85rem; border-radius: 8px; }
    .tag-field { font-size: 1rem; }

    .save-btn { width: 100%; min-height: 52px; font-size: 0.9rem; border-radius: 8px; margin-top: 1.4rem; align-self: auto; }

    .notebook-grid { grid-template-columns: 1fr; gap: 1rem; }
    .notebook-card { padding: 1.1rem 1rem 1.1rem 1.3rem; min-height: 120px; }
    .notebook-title { font-size: 1.15rem; }
    .notebook-excerpt, .entry-view-body { font-size: 1.05rem; line-height: 1.8; }
    .entry-view-title { font-size: clamp(1.8rem, 6vw, 2.4rem); }

    .back-btn { width: 42px; height: 42px; font-size: 1.1rem; }
    .welcome-cta { padding: 0.9rem 2.5rem; font-size: 0.9rem; min-height: 50px; }
  }

  @media (max-width: 640px) {
    .top-nav { padding: 0 0.9rem; height: 60px; }
    .new-entry-btn { min-height: 42px; padding: 0 0.85rem; font-size: 0.8rem; }
    .editor-area { padding: 1.2rem 0.9rem 4.5rem; }
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="bg-pattern"></div>
  <div class="bg-lines"></div>

  <div class="login-card">
    <div class="brand-mark">
      <svg class="brand-icon" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="4" width="26" height="30" rx="2" fill="#1a3a6b" opacity="0.12"/>
        <rect x="8" y="6" width="22" height="26" rx="2" fill="none" stroke="#1a3a6b" stroke-width="1.5"/>
        <line x1="13" y1="14" x2="25" y2="14" stroke="#1a3a6b" stroke-width="1.2"/>
        <line x1="13" y1="19" x2="25" y2="19" stroke="#1a3a6b" stroke-width="1.2" opacity="0.6"/>
        <line x1="13" y1="24" x2="20" y2="24" stroke="#1a3a6b" stroke-width="1.2" opacity="0.4"/>
        <circle cx="29" cy="29" r="5" fill="#c8a84b"/>
        <path d="M27 29l1.5 1.5L31 27" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">folio</span>
    </div>

    <h1 class="login-headline">What's on your mind today, Treasure?</h1>
    <div class="gold-line"></div>
    <p class="login-sub">Your Forever Journal</p>
    <div class="divider"><div class="divider-gem"></div></div>

    <div class="login-form">
      <div class="field-group">
        <input type="password" id="pass-field" autocomplete="current-password">
        <label for="pass-field">Passphrase</label>
      </div>
      <div id="login-error" style="display:none;font-size:0.78rem;color:#c0392b;letter-spacing:0.02em;">
        Incorrect passphrase. Try again.
      </div>
      <button class="login-btn" onclick="enterJournal()">Open My Journal</button>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page">
  <nav class="top-nav">
    <div class="nav-brand">
      <svg width="20" height="20" viewBox="0 0 38 38" fill="none">
        <rect x="8" y="6" width="22" height="26" rx="2" fill="none" stroke="#1a3a6b" stroke-width="1.5"/>
        <line x1="13" y1="14" x2="25" y2="14" stroke="#1a3a6b" stroke-width="1.2"/>
        <line x1="13" y1="19" x2="25" y2="19" stroke="#1a3a6b" stroke-width="1.2" opacity="0.6"/>
        <circle cx="29" cy="29" r="5" fill="#c8a84b"/>
      </svg>
      folio
    </div>
    <div class="nav-right">
      <button class="new-entry-btn" onclick="openNewEntry()">+ New Entry</button>
      <div class="avatar-btn" id="avatar" onclick="toggleAvatarMenu()">
        T
        <div class="avatar-dropdown">
          <a onclick="showNotebook(); closeAvatarMenu();"> Saved Writeups</a>
          <a class="sign-out" onclick="signOut()">Sign out</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="search-bar">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search entries..." id="search-input" oninput="filterEntries(this.value)">
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">All Entries</div>
        <ul class="entry-list" id="entry-list"></ul>
      </div>
    </aside>

    <main class="editor-area">
      <div class="mobile-search">
        <input type="text" placeholder="Search entries..." oninput="filterEntries(this.value)">
      </div>

      <!-- WELCOME -->
      <div class="welcome-state" id="welcome-state">
        <button class="welcome-cta" onclick="openNewEntry()">Begin Today's Entry</button>
      </div>

      <!-- NOTEBOOK VIEW -->
      <div class="notebook-view" id="notebook-view">
        <div class="entry-view-header">
          <div class="entry-view-meta">
            <span class="entry-view-date">Your Notebook Shelf</span>
          </div>
          <h2 class="entry-view-title">Saved Writeups</h2>
        </div>
        <div class="notebook-grid" id="notebook-grid"></div>
      </div>

      <!-- EDITOR FORM -->
      <div class="editor-form" id="editor-form">
        <div class="editor-meta">
          <button class="back-btn" onclick="showNotebook()" aria-label="Back">←</button>
          <span class="editor-date-display" id="editor-date"></span>
        </div>

        <div class="tag-input-wrapper" id="tag-wrapper" onclick="document.getElementById('tag-field').focus()">
          <span style="font-size:0.72rem;color:var(--ink-muted);letter-spacing:.05em;text-transform:uppercase;margin-right:4px;">Tags:</span>
          <div id="tags-container"></div>
          <input class="tag-field" id="tag-field" placeholder="Add tag + Enter" onkeydown="handleTag(event)">
        </div>

        <textarea class="title-field" id="entry-title" placeholder="What's the Title...?" rows="1" oninput="autoResize(this)"></textarea>

        <!-- SIMPLIFIED TOOLBAR -->
        <div class="toolbar" id="toolbar">
          <button class="tool-btn" id="tb-bold" onclick="fmt('bold')" title="Bold"><b>B</b></button>
          <button class="tool-btn" id="tb-italic" onclick="fmt('italic')" title="Italic"><i>I</i></button>
          <button class="tool-btn" id="tb-underline" onclick="fmt('underline')" title="Underline"><u>U</u></button>
          <div class="tool-sep"></div>
          <button class="tool-btn" id="tb-ul" onclick="fmt('insertUnorderedList')" title="Bullet list">• List</button>
          <button class="tool-btn" id="tb-ol" onclick="fmt('insertOrderedList')" title="Numbered list">1. List</button>
          <div class="tool-sep"></div>
          <button class="tool-btn" id="tb-quote" onclick="insertBlockquote()" title="Blockquote">" Quote</button>
        </div>

        <div class="body-field" id="entry-body" contenteditable="true" data-placeholder="Pour your heart out here... this is your space."></div>
        <button class="save-btn" onclick="saveEntry()">Save Entry</button>
      </div>

      <!-- VIEW MODE -->
      <div class="entry-view" id="entry-view">
        <div class="entry-view-header">
          <div class="entry-view-meta">
            <button class="back-btn" onclick="showNotebook()" aria-label="Back">←</button>
            <span class="entry-view-date" id="view-date"></span>
          </div>
          <h2 class="entry-view-title" id="view-title"></h2>
          <div class="entry-view-tags" id="view-tags"></div>
        </div>
        <div class="entry-view-body" id="view-body"></div>
        <div style="margin-top:2rem;display:flex;gap:0.75rem;">
          <button onclick="editCurrentEntry()" style="padding:0.55rem 1.2rem;border:1px solid var(--royal);color:var(--royal);background:transparent;border-radius:4px;font-family:var(--sans);font-size:0.8rem;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;">Edit</button>
          <button onclick="deleteCurrentEntry()" style="padding:0.55rem 1.2rem;border:1px solid #ddd;color:#c0392b;background:transparent;border-radius:4px;font-family:var(--sans);font-size:0.8rem;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;">Delete</button>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let entries = [];
let currentTags = [];
let activeEntryId = null;
let editingId = null;
let avatarOpen = false;
let activeNotebookId = null;

// ── API CONFIG ──
const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const API_BASE = IS_LOCAL ? 'http://localhost:3000' : 'https://folio-topaz-zeta.vercel.app/';
console.log('[Folio] API_BASE:', API_BASE);

// sessionStorage — passphrase only lives for this tab/session
let apiPassphrase = sessionStorage.getItem('folio_passphrase') || '';

// ── AUTH ──
async function enterJournal() {
  const pass = (document.getElementById('pass-field').value || '').trim();
  const errorEl = document.getElementById('login-error');
  const btn = document.querySelector('.login-btn');

  if (!pass) {
    errorEl.textContent = 'Please enter your passphrase.';
    errorEl.style.display = 'block';
    return;
  }

  errorEl.style.display = 'none';
  btn.textContent = 'Opening…';
  btn.disabled = true;
  apiPassphrase = pass;

  try {
    await apiFetch('/notebooks');
  } catch (err) {
    btn.textContent = 'Open My Journal';
    btn.disabled = false;
    if (err.message && (err.message.includes('401') || err.message.includes('403'))) {
      errorEl.textContent = 'Incorrect passphrase. Try again.';
    } else if (err.name === 'AbortError') {
      errorEl.textContent = 'Server is waking up. Please wait 30s and try again.';
    } else if (err.message && err.message.includes('Failed to fetch')) {
      errorEl.textContent = 'Cannot reach the server. Check your connection.';
    } else {
      errorEl.textContent = `Connection error: ${err.message}`;
    }
    errorEl.style.display = 'block';
    apiPassphrase = '';
    return;
  }

  sessionStorage.setItem('folio_passphrase', pass);

  try {
    await ensureNotebook();
    await loadEntries();
    localStorage.setItem('folio_entries', JSON.stringify(entries));
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-page').style.display = 'block';
    renderSidebar(entries);
    renderNotebookGrid(entries);
    showNotebook();
  } catch (err) {
    errorEl.textContent = 'Logged in but failed to load. Please refresh.';
    errorEl.style.display = 'block';
  } finally {
    btn.textContent = 'Open My Journal';
    btn.disabled = false;
  }
}

function signOut() {
  document.getElementById('app-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pass-field').value = '';
  document.getElementById('login-error').style.display = 'none';
  sessionStorage.removeItem('folio_passphrase');
  apiPassphrase = '';
  activeNotebookId = null;
  entries = [];
  closeAvatarMenu();
}

// ── API FETCH ──
async function apiFetch(path, options = {}) {
  const opts = { method: 'GET', ...options };
  opts.headers = {
    'Content-Type': 'application/json',
    'X-Passphrase': apiPassphrase,
    ...(options.headers || {})
  };
  if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);

  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 45000);
  opts.signal = controller.signal;

  const url = `${API_BASE}${path}`;
  console.log(`[Folio] ${opts.method} ${url}`);

  let res;
  try {
    res = await fetch(url, opts);
  } catch (err) {
    clearTimeout(tid);
    console.error(`[Folio] Network error:`, err);
    throw err;
  }
  clearTimeout(tid);

  if (!res.ok) {
    let message = `Request failed (${res.status})`;
    try { const e = await res.json(); if (e.error) message = e.error; } catch {}
    throw new Error(message);
  }
  return res.json();
}

// ── NOTEBOOK / ENTRIES ──
async function ensureNotebook() {
  const notebooks = await apiFetch('/notebooks');
  if (!notebooks.length) {
    const created = await apiFetch('/notebooks', { method: 'POST', body: { title: 'My Notebook' } });
    activeNotebookId = created.id;
    return;
  }
  activeNotebookId = notebooks[0].id;
}

function blocksToText(blocks) {
  if (!Array.isArray(blocks)) return '';
  return blocks.map(b => (b && b.text ? b.text : '')).join('\n\n').trim();
}
function blocksToHtml(blocks) {
  if (!Array.isArray(blocks)) return '';
  return blocks.map(b => (b && b.html ? b.html : '')).join('\n').trim();
}
function pageToEntry(page) {
  return {
    id: page.id,
    date: page.date || page.createdAt || new Date().toISOString(),
    title: page.title || '',
    body: blocksToText(page.blocks),
    bodyHtml: blocksToHtml(page.blocks),
    tags: Array.isArray(page.tags) ? page.tags : []
  };
}

async function loadEntries() {
  if (!activeNotebookId) return;
  const pages = await apiFetch(`/notebooks/${activeNotebookId}/pages`);
  entries = pages.map(pageToEntry);
  localStorage.setItem('folio_entries', JSON.stringify(entries));
}

// ── SIMPLIFIED TOOLBAR COMMANDS ──
const TOOLBAR_CMDS = {
  'tb-bold': 'bold',
  'tb-italic': 'italic',
  'tb-underline': 'underline',
  'tb-ul': 'insertUnorderedList',
  'tb-ol': 'insertOrderedList'
};

function fmt(cmd) {
  document.getElementById('entry-body').focus();
  document.execCommand(cmd);
  updateToolbar();
}

function insertBlockquote() {
  const body = document.getElementById('entry-body');
  body.focus();
  const sel = window.getSelection();
  const selected = sel && sel.toString();
  const text = selected || 'Quote here…';
  document.execCommand('insertHTML', false,
    `<blockquote style="border-left:3px solid var(--gold);margin:0.5em 0;padding:0.4em 1em;color:var(--ink-muted);font-style:italic;">${text}</blockquote>`
  );
  updateToolbar();
}

function updateToolbar() {
  Object.entries(TOOLBAR_CMDS).forEach(([id, cmd]) => {
    const btn = document.getElementById(id);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

document.addEventListener('selectionchange', () => {
  if (document.activeElement && document.activeElement.id === 'entry-body') updateToolbar();
});

// ── SIDEBAR ──
function renderSidebar(list) {
  const el = document.getElementById('entry-list');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<li style="padding:.5rem .75rem;font-size:.8rem;color:var(--ink-muted);font-style:italic;">No entries yet.</li>';
    return;
  }
  list.slice().reverse().forEach(e => {
    const li = document.createElement('li');
    li.className = `entry-item ${e.id === activeEntryId ? 'active' : ''}`;
    li.dataset.id = e.id;
    li.innerHTML = `
      <div class="entry-item-date">${formatDateShort(new Date(e.date))}</div>
      <div class="entry-item-title">${e.title || 'Untitled'}</div>
    `;
    li.onclick = () => viewEntry(e.id);
    el.appendChild(li);
  });
}

function filterEntries(q) {
  if (!q.trim()) { renderSidebar(entries); renderNotebookGrid(entries); return; }
  const filtered = entries.filter(e =>
    (e.title || '').toLowerCase().includes(q.toLowerCase()) ||
    (e.body || '').toLowerCase().includes(q.toLowerCase()) ||
    (e.tags || []).some(t => t.toLowerCase().includes(q.toLowerCase()))
  );
  renderSidebar(filtered);
  renderNotebookGrid(filtered);
}

// ── NEW ENTRY ──
function openNewEntry() {
  editingId = null; 
  activeEntryId = null; 
  currentTags = [];
  document.getElementById('entry-title').value = '';
  document.getElementById('entry-body').innerHTML = '';
  document.getElementById('tags-container').innerHTML = '';
  document.getElementById('tag-field').value = '';
  document.getElementById('editor-date').textContent = formatDate(new Date());
  
  show('editor-form'); 
  hide('welcome-state'); 
  hide('notebook-view'); 
  hide('entry-view');
  document.getElementById('entry-title').focus();
  document.querySelectorAll('.entry-item').forEach(i => i.classList.remove('active'));
}

// ── VIEW ENTRY ──
function viewEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  activeEntryId = id;
  hide('welcome-state'); 
  hide('editor-form'); 
  hide('notebook-view'); 
  show('entry-view');
  document.getElementById('view-date').textContent = formatDate(new Date(e.date));
  document.getElementById('view-title').textContent = e.title || 'Untitled';
  document.getElementById('view-body').innerHTML = e.bodyHtml || (e.body || '').replace(/\n/g, '<br>');
  document.getElementById('view-tags').innerHTML = (e.tags || []).map(t => `<span class="tag-pill">${t}</span>`).join('');
  document.querySelectorAll('.entry-item').forEach(i => i.classList.toggle('active', i.dataset.id === id));
}

function editCurrentEntry() {
  const e = entries.find(x => x.id === activeEntryId);
  if (!e) return;
  editingId = e.id;
  currentTags = [...(e.tags || [])];
  document.getElementById('entry-title').value = e.title || '';
  document.getElementById('entry-body').innerHTML = e.bodyHtml || '';
  document.getElementById('editor-date').textContent = formatDate(new Date(e.date));
  renderTagPills();
  show('editor-form'); 
  hide('entry-view'); 
  hide('welcome-state');
}

async function deleteCurrentEntry() {
  if (!activeEntryId) return;
  if (!confirm('Delete this entry permanently?')) return;
  try {
    await apiFetch(`/notebooks/${activeNotebookId}/pages/${activeEntryId}`, { method: 'DELETE' });
    await loadEntries();
    renderSidebar(entries); 
    renderNotebookGrid(entries);
    activeEntryId = null; 
    hide('entry-view'); 
    showNotebook();
    toast('Entry deleted.');
  } catch { toast('Delete failed.'); }
}

// ── SAVE ──
async function saveEntry() {
  const title = document.getElementById('entry-title').value.trim();
  const bodyEl = document.getElementById('entry-body');
  const bodyText = bodyEl.textContent.trim();
  const bodyHtml = bodyEl.innerHTML.trim();

  if (!bodyText) { toast('Please write something before saving.'); return; }
  const blocks = [{ type: 'rich', text: bodyText, html: bodyHtml }];

  try {
    if (editingId) {
      const existing = entries.find(x => x.id === editingId);
      await apiFetch(`/notebooks/${activeNotebookId}/pages/${editingId}`, {
        method: 'PUT',
        body: { title, blocks, tags: [...currentTags], date: existing?.date || new Date().toISOString() }
      });
      toast('Entry updated');
    } else {
      const created = await apiFetch(`/notebooks/${activeNotebookId}/pages`, {
        method: 'POST',
        body: { title, blocks, tags: [...currentTags], date: new Date().toISOString() }
      });
      activeEntryId = created.id;
      toast('Entry saved');
    }
    await loadEntries();
    renderSidebar(entries); 
    renderNotebookGrid(entries);
    viewEntry(activeEntryId);
  } catch { toast('Save failed.'); }
}

// ── TAGS ──
function handleTag(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g, '');
    if (val && !currentTags.includes(val)) { currentTags.push(val); renderTagPills(); }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
    currentTags.pop(); 
    renderTagPills();
  }
}
function renderTagPills() {
  document.getElementById('tags-container').innerHTML = currentTags.map((t, i) =>
    `<span class="tag-pill">${t}<button class="tag-remove" onclick="removeTag(${i})">&times;</button></span>`
  ).join('');
}
function removeTag(i) { 
  currentTags.splice(i, 1); 
  renderTagPills(); 
}

// ── UTILS ──
function autoResize(el) { 
  el.style.height = 'auto'; 
  el.style.height = el.scrollHeight + 'px'; 
}
function show(id) { 
  document.getElementById(id).style.display = 'block'; 
}
function hide(id) { 
  document.getElementById(id).style.display = 'none'; 
}

function toggleAvatarMenu() {
  const avatar = document.getElementById('avatar');
  if (!avatar) return;
  avatarOpen = !avatarOpen;
  avatar.classList.toggle('open', avatarOpen);
}
function closeAvatarMenu() {
  const avatar = document.getElementById('avatar');
  if (!avatar) return;
  avatarOpen = false;
  avatar.classList.remove('open');
}
document.addEventListener('click', e => {
  const avatar = document.getElementById('avatar');
  if (!avatar || avatar.contains(e.target)) return;
  closeAvatarMenu();
});

function showNotebook() {
  if (!entries.length) { 
    show('welcome-state'); 
    hide('notebook-view'); 
    return; 
  }
  hide('welcome-state'); 
  hide('editor-form'); 
  hide('entry-view'); 
  show('notebook-view');
}

function renderNotebookGrid(list) {
  const grid = document.getElementById('notebook-grid');
  if (!grid) return;
  grid.innerHTML = '';
  if (!list.length) { 
    grid.innerHTML = '<div style="font-size:0.85rem;color:var(--ink-muted);">No writeups yet.</div>'; 
    return; 
  }
  list.slice().reverse().forEach(e => {
    const card = document.createElement('div');
    card.className = 'notebook-card';
    const excerpt = (e.body || '').slice(0, 120).trim();
    card.innerHTML = `
      <div class="notebook-spine"></div>
      <div class="notebook-title">${e.title || 'Untitled'}</div>
      <div class="notebook-meta">${formatDateShort(new Date(e.date))}</div>
      <div class="notebook-excerpt">${excerpt || 'No preview yet.'}</div>
    `;
    card.onclick = () => viewEntry(e.id);
    grid.appendChild(card);
  });
}

function formatDate(d) { 
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); 
}
function formatDateShort(d) { 
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); 
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Ctrl/Cmd + S
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('editor-form').style.display !== 'none') saveEntry();
  }
});
 // Add this to your existing JS script section
async function apiFetch(path, options = {}) {
  const opts = {
    method: options.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'X-Passphrase': apiPassphrase,
      ...options.headers
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  };

  const url = `${API_BASE}${path}`;
  
  try {
    const res = await fetch(url, opts);
    
    // Handle Vercel "Cold Start" (the 504 timeout)
    if (res.status === 504) {
      toast("Server waking up... retrying...");
      return new Promise(resolve => setTimeout(() => resolve(apiFetch(path, options)), 3000));
    }

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `Error ${res.status}`);
    }

    return await res.json();
  } catch (err) {
    console.error("[Folio Error]", err);
    throw err;
  }
}
</script>
